name: web

on:
  pull_request:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web.yml'
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web.yml'

permissions:
  contents: read

defaults:
  run:
    working-directory: web

jobs:
  verify:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Public content check
        run: pnpm check:content

      - name: Tests
        run: pnpm test

      - name: Link check
        run: pnpm check:links

      - name: Build
        run: pnpm build
